<h3>Fibonacci Time Zones</h3>
<p>The Fibonacci Time Zones study consists of vertical lines at the Fibonacci 
  intervals of 1, 2, 3, 5, 8, 13, 21, 34, etc. The interpretation of Fibonacci 
  Time Zones involves looking for significant changes in price near the vertical 
  lines.</p>
