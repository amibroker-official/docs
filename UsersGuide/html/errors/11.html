<h4>Error 11. Subscript operator []
  requires array or number type. String
can not be used here.</h4>
<p>Occurs when you attempt to use subscript operator [] on strings, for example:</p>
<p><CODE><FONT COLOR=#000000>tt = </FONT><FONT COLOR=#ff00ff>"Test"</FONT><FONT COLOR=#000000>; <BR>
      <BR>
      x = tt[ </FONT><FONT COLOR=#ff00ff>0</FONT><FONT COLOR=#000000> ];</FONT></CODE><br>
</p>
<p>&nbsp;</p>

</body>
</html>
