<h4><strong>Error 12. Subscript operator [] requires array or number type.</strong></h4>
<p>Occurs when subscript operator [] is applied to some other unsupported type
  (such as COM object dispatch)):<br>
  <br>
  <CODE><FONT COLOR=#000000>a=</FONT><FONT COLOR=#0000ff>CreateObject</FONT><FONT COLOR=#000000>(</FONT><FONT COLOR=#ff00ff>"Broker.Application"</FONT><FONT COLOR=#000000>); <BR>
  b = a[</FONT><FONT COLOR=#ff00ff>0</FONT><FONT COLOR=#000000>];</FONT></CODE></p>
<p>&nbsp;</p>

</body>
</html>
