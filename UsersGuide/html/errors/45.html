<h4>Error 45. Failed to lauch trading interface</h4>
<p>Problem occurs when formula calls GetTradingInterface but required interface
  is not installed or registered properly.</p>
<p><CODE><FONT COLOR=#000000>ti = </FONT><FONT COLOR=#0000ff>GetTradingInterface</FONT><FONT COLOR=#000000>(</FONT><FONT COLOR=#ff00ff>"DUMMY"</FONT><FONT COLOR=#000000>); </FONT><FONT COLOR=#008000>//
fails because DUMMY interface is not installed </FONT></CODE></p>
