<h4>Error 46. Missing comma</h4>
<p>Problem occurs when there is a missing comma in the function declaration formal
  parameter list</p>
<p><CODE><FONT COLOR=#000000></FONT><FONT COLOR=#000000></FONT><FONT COLOR=#800000><B>function</B></FONT><FONT COLOR=#000000> MyFun(
      x y ) </FONT><FONT COLOR=#008000>// missing comma in the formal parameter
      list</FONT><FONT COLOR=#000000> <BR>
  { <BR>
  &nbsp;&nbsp;&nbsp;</FONT><FONT COLOR=#800000><B>return</B></FONT><FONT COLOR=#000000> x
  * y; <BR>
}</FONT></CODE></p>
</body>
