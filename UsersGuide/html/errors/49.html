<h4>Error 49. Optimization parameter name must not be empty.</h4>
<p>This error occurs when Optimize() function is called with empty name argument.</p>
<p>Example:</p>
<p><CODE><FONT COLOR=#000000></FONT><FONT COLOR=#000000>period = </FONT><FONT COLOR=#0000ff>Optimize</FONT><FONT COLOR=#000000>(</FONT><FONT COLOR=#ff00ff>""</FONT><FONT COLOR=#000000>, </FONT><FONT COLOR=#ff00ff>10</FONT><FONT COLOR=#000000>, </FONT><FONT COLOR=#ff00ff>10</FONT><FONT COLOR=#000000>, </FONT><FONT COLOR=#ff00ff>20</FONT><FONT COLOR=#000000>, </FONT><FONT COLOR=#ff00ff>1</FONT><FONT COLOR=#000000> ); </FONT><FONT COLOR=#008000>//
      WRONG: name must NOT be empty</FONT><FONT COLOR=#000000> <BR>
</FONT></CODE></p>
</body>
</html>
