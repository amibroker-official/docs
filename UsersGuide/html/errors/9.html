<h4>Error 9. Array subscript has to be a number</h4>
<p>You can use only numbers as array subscripts, strings and arrays are not accepted:</p>
<p><CODE><FONT COLOR=#000000>table[ </FONT><FONT COLOR=#ff00ff>1</FONT><FONT COLOR=#000000> ]
      = </FONT><FONT COLOR=#ff00ff>10</FONT><FONT COLOR=#000000>; </FONT><FONT COLOR=#008000>//
      correct</FONT><FONT COLOR=#000000> <BR>
  table[ </FONT><FONT COLOR=#ff00ff>"text"</FONT><FONT COLOR=#000000> ] = </FONT><FONT COLOR=#ff00ff>10</FONT><FONT COLOR=#000000>; </FONT><FONT COLOR=#008000>//
  incorrect</FONT><FONT COLOR=#000000> <BR>
  table[ </FONT><FONT COLOR=#000000><B>Close</B></FONT><FONT COLOR=#000000> ] = </FONT><FONT COLOR=#ff00ff>10</FONT><FONT COLOR=#000000>; </FONT><FONT COLOR=#008000>//
incorrect </FONT></CODE></p>
<p>&nbsp;</p>

</body>
</html>
