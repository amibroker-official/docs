<h4><a name="E38"></a>Error 38. Unsupported field in GetOptions</h4>
<p>Occurs when wrong (or not supported) field name was used in GetOption call,
  for example:</p>
<p><CODE><FONT COLOR=#000000>x = </FONT><FONT COLOR=#0000ff>GetOption</FONT><FONT COLOR=#000000>(</FONT><FONT COLOR=#ff00ff>"NoSuchOption"</FONT><FONT COLOR=#000000>);</FONT></CODE></p>
<p>&nbsp;</p>
