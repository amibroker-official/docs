<h4>Error 25. SetVariable() called from plug in was not successful. Identifier
is already used in a different context.</h4>
<p>Happens if  external plugin attempts to call SetVariable with identifier
  that is already used for some other purpose<br>
  (like built-in or user-defined function)</p>
