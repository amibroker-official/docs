<h4><a name="E1" id="E1"></a>Error 705. You can not use HoldMinBars together
with Allow Same Bar exit</h4>
<p>You can not mix HoldMinBars option with AllowSameBarExit<br>
</p>
<p><CODE><FONT COLOR=#000000></FONT><FONT COLOR=#000000></FONT><FONT COLOR=#0000ff>SetOption</FONT><FONT COLOR=#000000>(</FONT><FONT COLOR=#800080>"AllowSameBarExit"</FONT><FONT COLOR=#000000>, </FONT><FONT COLOR=#000000><B>True</B></FONT><FONT COLOR=#000000> ); <BR>
</FONT><FONT COLOR=#0000ff>SetOption</FONT><FONT COLOR=#000000>(</FONT><FONT COLOR=#800080>"HoldMinBars"</FONT><FONT COLOR=#000000>, </FONT><FONT COLOR=#800080>5</FONT><FONT COLOR=#000000> ); </FONT><FONT COLOR=#008000>//
ERROR - these two do not mix </FONT></CODE></p>
<p>&nbsp;</p>
<p>&nbsp;</p>
