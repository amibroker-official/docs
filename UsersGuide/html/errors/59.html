<h4>Error 59. Too many subscripts</h4>
<p>This error occurs when you are trying to use triple subscript (three dimensional
  subscript) on two dimensional matrix.</p>
<p><CODE>mx = <font color='#0000ff'>Matrix</font>( <font color='#800080'>2</font>, <font color='#800080'>3</font> ); <br>
    <br>
    x = mx[ <font color='#800080'>1</font> ][ <font color='#800080'>2</font> ][ <font color='#800080'>3</font> ]; <font color='#008000'>//
mx has 2 dimensions only, you can not use 3rd subscript operator </font></CODE></p>
</body>
</html>
