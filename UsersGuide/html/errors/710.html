<h4>Error 710. Range Start date must not be greater than End date</h4>
<p>You have attempted to run Analysis using &quot;From-to&quot; range, with <strong>Start/From</strong>  date
  being greater than <strong>End/To</strong> date. Please correct the dates so <strong>Start</strong> is
  equal or earlier than <strong>End</strong> date.</p>
</body>
