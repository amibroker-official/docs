<p>May occur during call to SectorID() function if external data plugin sets
  sector IDs incorrectly (outide 0..63 range)</p>
<p><CODE><FONT COLOR=#000000>  x = </FONT><FONT COLOR=#0000ff>SectorID</FONT><FONT COLOR=#000000>(); </FONT><FONT COLOR=#008000>//
      the formula is correct, but may fail with error 44 if data plugin sets sectors
      incorrectly</FONT><FONT COLOR=#000000> <BR>
    </FONT></CODE></p>
