<h4><a name="E17"></a>Error 17. Missing arguments</h4>
<p>Occurs when too few arguments were passed during function call. Example:</p>
<p><CODE><FONT COLOR=#0000ff>Plot</FONT><FONT COLOR=#000000>( <B>C</B>, </FONT><FONT COLOR=#ff00ff>"Price"</FONT><FONT COLOR=#000000> ); </FONT><FONT COLOR=#008000>//
too few arguments,  3rd argument is required - color of the plot</FONT></CODE></p>
<p>&nbsp;</p>
