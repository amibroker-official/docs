<h4>Error 37. Unsupported field in SetOptions</h4>
<p>Occurs when wrong (or not supported) field name was used in SetOption call,
  for example:</p>
<p><CODE><FONT COLOR=#000000></FONT><FONT COLOR=#0000ff>SetOption</FONT><FONT COLOR=#000000>(</FONT><FONT COLOR=#ff00ff>"NoSuchOption"</FONT><FONT COLOR=#000000>, </FONT><FONT COLOR=#ff00ff>1</FONT><FONT COLOR=#000000> );</FONT></CODE></p>
<p>&nbsp;</p>
