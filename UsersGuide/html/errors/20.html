<h4>Error 20. COM Method/function '%s' does not exist</h4>
<p>Occurs on attempt to call not existing OLE method/property. Example:<br>
  <br>
  <CODE><FONT COLOR=#000000>AB=</FONT><FONT COLOR=#0000ff>CreateObject</FONT><FONT COLOR=#000000>(</FONT><FONT COLOR=#ff00ff>"Broker.Application"</FONT><FONT COLOR=#000000>); <BR>
  AB.Test(); </FONT><FONT COLOR=#008000>// there is no such method</FONT></CODE></p>
<p>&nbsp;</p>

</body>
</html>
