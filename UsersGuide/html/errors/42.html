<h4>Error 42. #include failed because the file does not exist: &lt;filename&gt; (current
working directory is '...')</h4>
<p>Occurs when specified include file does not exist. Example:<br>
  <br>
  <CODE><FONT COLOR=#000000></FONT><FONT COLOR=#800000><B>#include</B></FONT><FONT COLOR=#000000> </FONT><FONT COLOR=#ff00ff>"not\existing\path\to\the\file.afl"</FONT></CODE></p>
<p>&nbsp;</p>
