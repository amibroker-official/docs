<h4>Error 16. Too many arguments</h4>
<p>Occurs when too many arguments were specified when calling the function. For
  example:</p>
<p><CODE><FONT COLOR=#000000>m = </FONT><FONT COLOR=#0000ff>MACD</FONT><FONT COLOR=#000000>( </FONT><FONT COLOR=#ff00ff>12</FONT><FONT COLOR=#000000>, </FONT><FONT COLOR=#ff00ff>26</FONT><FONT COLOR=#000000>, </FONT><FONT COLOR=#ff00ff>3</FONT><FONT COLOR=#000000> ); </FONT><FONT COLOR=#008000>//
error: MACD needs only 2 parameters, but 3 are specified</FONT></CODE></p>
<p>&nbsp;</p>
<p>&nbsp;</p>
