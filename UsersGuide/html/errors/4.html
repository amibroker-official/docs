<h4>Error 4. Incorrect type of argument(s). Expecting number here.</h4>
<p>This occurs in ApplyStop function when Type, Mode, ExitAtStop or Volatile
  parameter is an array</p>
<p><CODE><FONT COLOR=#000000> <BR>
</FONT><FONT COLOR=#008000>// wrong - stop mode (precent/point) can not be array</FONT><FONT COLOR=#000000> <BR>
</FONT><FONT COLOR=#0000ff>ApplyStop</FONT><FONT COLOR=#000000>( </FONT><FONT COLOR=#000000><B>stopTypeLoss</B></FONT><FONT COLOR=#000000>, </FONT><FONT COLOR=#0000ff>IIf</FONT><FONT COLOR=#000000>( </FONT><FONT COLOR=#000000><B>C</B></FONT><FONT COLOR=#000000> &gt; </FONT><FONT COLOR=#000000><B>O</B></FONT><FONT COLOR=#000000>, </FONT><FONT COLOR=#000000><B>stopModePercent</B></FONT><FONT COLOR=#000000>, </FONT><FONT COLOR=#000000><B>stopModePoint</B></FONT><FONT COLOR=#000000> ), </FONT><FONT COLOR=#ff00ff>5</FONT><FONT COLOR=#000000> ); <BR>
</FONT></CODE></p>

</body>
