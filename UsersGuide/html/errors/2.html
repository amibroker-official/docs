<h4><a name="E2"></a>Error 2. <strong>Incorrect
type of argument. Expecting number or array here.</strong></h4>
<p>This occurs when calling single-argument mathematical function like sin()
  which accepts only numbers and arrays,<br>
  but the user specified string for example.</p>
<p><CODE><FONT COLOR=#000000>x= </FONT><FONT COLOR=#0000ff>sin</FONT><FONT COLOR=#000000>(</FONT><FONT COLOR=#ff00ff>"test"</FONT><FONT COLOR=#000000>); </FONT><FONT COLOR=#008000>//
sin requires number or array</FONT></CODE></p>

</body>
