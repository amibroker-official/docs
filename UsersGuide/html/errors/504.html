<h4><a name="E1" id="E1"></a>Warning 504. Symbol 'x' not found in 'y' function
call</h4>
<p>Your formula is calling a function that takes ticker symbol as input but the
symbol requested does not exist in the database</p>
<p>Example:</p>
<p><CODE>x = <font color='#0000ff'>GetExtraDataForeign</font>(<font color='#800080'>"Shares"</font>, <font color='#800080'>"NonExistingTicker"</font>); <font color='#008000'>//
      would give warning 504</font></CODE><CODE>
</CODE></p>
