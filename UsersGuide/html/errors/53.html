<h4><a name="E1" id="E1"></a>Error 53. You have N open file(s) that you forgot
to close. You must call fclose() function for every file opened with fopen()</h4>
<p>You called fopen() to open files but failed to call fclose.</p>
<p><CODE><FONT COLOR=#000000></FONT><FONT COLOR=#000000>fh = </FONT><FONT COLOR=#0000ff>fopen</FONT><FONT COLOR=#000000>(</FONT><FONT COLOR=#800080>"test.txt"</FONT><FONT COLOR=#000000>, </FONT><FONT COLOR=#800080>"w"</FONT><FONT COLOR=#000000> ); <BR>
</FONT><FONT COLOR=#800000><B>if</B></FONT><FONT COLOR=#000000>( fh ) <BR>
{ <BR>
&nbsp;&nbsp; 
</FONT><FONT COLOR=#008000>// fclose( fh ); // fclose() SHOULD be called</FONT><FONT COLOR=#000000> <BR>
} </FONT></CODE></p>
