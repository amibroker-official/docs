<h4> Error 63. The image file 'name' does not exist</h4>
<p>You have called GfxDrawImage function with the file name that does not exist
  (check the path and verify that the file you specified is in correct location).</p>
<p><CODE><font color='#0000ff'>GfxDrawImage</font>(<font color='#800080'>"nonexistingfile.gif"</font>, <font color='#800080'>10</font>, <font color='#800080'>10</font> );</CODE> <CODE><font color='#008000'>//
      would trigger error 63</font></CODE><br>
</p>
<p>&nbsp;</p>
